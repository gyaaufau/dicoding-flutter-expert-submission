version: 0.0.1
publish_to: none
homepage:

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  data_connection_checker:
    git:
      url: https://github.com/chornthorn/data_connection_checker.git
      ref: master
  http: ^1.2.2
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  equatable: ^2.0.5
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  get_it: ^7.7.0
  go_router: ^17.2.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  package_info_plus: ^8.3.1
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0

dev_dependencies:
  bloc_test: ^10.0.0
  mockito: ^5.0.8
  build_runner: ^2.0.4
  flutter_lints: ^6.0.0
  flutter_test:
